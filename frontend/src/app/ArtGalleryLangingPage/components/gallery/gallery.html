<section id="galeria" class="border-t border-zinc-100 bg-white">
            <div class="max-w-6xl mx-auto px-6 py-24 lg:py-10">
                <div class="flex flex-col md:flex-row items-start md:items-end justify-between gap-6 mb-16">
                    <div class="max-w-xl">
                        <h2 class="text-3xl font-semibold tracking-tight text-zinc-900">Obras Recientes</h2>
                        <p class="text-base text-zinc-500 mt-3 font-normal leading-relaxed">Una colección de piezas únicas creadas durante el último año, enfocadas en el estudio de la luz y la textura.</p>
                    </div>
                    <div class="flex gap-2">
                        <button (click)="prev()" [disabled]="currentPage === 0" class="p-2 rounded-full border border-zinc-200 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-50 transition-colors">
                            <iconify-icon icon="solar:arrow-left-linear" stroke-width="1.5" class="text-xl block"></iconify-icon>
                        </button>
                        <button (click)="next()" [disabled]="currentPage >= totalPages - 1"  class="p-2 rounded-full border border-zinc-200 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-50 transition-colors">
                            <iconify-icon icon="solar:arrow-right-linear" stroke-width="1.5" class="text-xl block"></iconify-icon>
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
                @for(artpiece of visibleArtWorks; track artpiece){
                    <art-piece [imageUrl]="artpiece.imageUrl" [alt]="artpiece.alt"></art-piece>
                }
            </div>

</section>
