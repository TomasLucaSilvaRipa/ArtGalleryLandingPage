<article class="m-5 group cursor-pointer">
                        <div class="relative aspect-3/4 mb-5 overflow-hidden rounded-xl bg-zinc-50 border border-zinc-200/50">
                            <img [src]="imageUrl()" [alt]="alt()" class="object-cover w-full h-full transition-transform duration-700 ease-out group-hover:scale-105">
                            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors duration-500"></div>
                        </div>
                        <div class="flex justify-between items-start gap-4">
                            <div>
                                <h3 class="text-base font-semibold tracking-tight text-zinc-900">Estudio en Azul</h3>
                                <p class="text-sm text-zinc-500 mt-1 font-normal">Acrílico sobre lienzo</p>
                            </div>
                            <span class="text-xs font-medium text-zinc-400 px-2 py-1 rounded-md border border-zinc-100 bg-zinc-50">2023</span>
                        </div>
</article>
